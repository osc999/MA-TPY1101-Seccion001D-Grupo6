<div class="container">
  <div class="card">

    <h1>🔮 Conecta Tarot</h1>
    <p class="subtitle">Descubre tu destino</p>

    <input
      type="email"
      placeholder="Correo electrónico"
      [(ngModel)]="email"
    />

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
    />

    <button (click)="login()">Iniciar sesión</button>

    <div class="login-actions">
      <button type="button" class="secondary" (click)="goToRecover()">Recuperar contraseña</button>
      <button type="button" class="secondary" (click)="goToRegister()">¿No tienes cuenta? Registrarse</button>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

  </div>
</div>
